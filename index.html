<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>사탐 누적 복습 마스터</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-content">
            <h1>📝 사탐 누적 복습 기록기</h1>
        </div>
    </header>

    <main class="container">
        <!-- 좌측 패널: 오늘의 할 일 -->
        <aside class="todo-panel">
            <h2>📅 오늘의 할 일</h2>
            <div id="todo-list" class="todo-list-container">
                <!-- JavaScript에서 할 일 목록이 동적으로 생성됨 -->
                <p class="empty-msg">오늘의 복습을 모두 완료했거나, 시작한 단원이 없습니다.</p>
            </div>
        </aside>

        <!-- 우측 패널: 전체 단원 목록 -->
        <section class="units-panel">
            <h2>📚 과목별 단원 목록</h2>
            <div id="subjects-container" class="accordion">
                <!-- JavaScript에서 아코디언 메뉴가 동적으로 생성됨 -->
            </div>
        </section>
    </main>

    <script type="module" src="main.js"></script>
</body>
</html>
